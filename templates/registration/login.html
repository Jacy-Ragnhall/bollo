{% extends 'base.html' %}
{% block title %}Log In - Bolloh{% endblock %}

{% block content %}
<div class="container my-5 d-flex justify-content-center align-items-center">
    <div class="glass-card p-5 shadow w-100" style="max-width: 480px;">
        
        <div class="text-center mb-4">
            <span class="brand-font fs-2 text-white"><i class="fa-solid fa-bolt text-info me-2"></i>Bolloh</span>
            <p class="text-white-50 small mt-2">Log in to manage your career or build your team.</p>
        </div>

        <form method="POST" action="{% url 'users:login' %}">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label text-white-50 small">Username or Email</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-white-50"><i class="fa-solid fa-user"></i></span>
                    <input type="text" name="username" class="form-control form-control-custom" placeholder="Enter username or email" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label text-white-50 small">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-white-50"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" name="password" class="form-control form-control-custom" placeholder="Enter password" required>
                </div>
            </div>

            <div class="d-grid mb-4">
                <button type="submit" class="btn btn-primary-gradient rounded-3 py-2"><i class="fa-solid fa-right-to-bracket me-2"></i> Log In</button>
            </div>
            
            <!-- Social logins -->
            <div class="text-center mb-4">
                <div class="small text-muted mb-3">Or authenticate with</div>
                <div class="d-flex justify-content-center gap-3">
                    <a href="{% url 'google_login' %}" class="btn btn-outline-light rounded-pill px-4 btn-sm d-flex align-items-center gap-2"><i class="fa-brands fa-google text-danger"></i> Google</a>
                    <a href="{% url 'linkedin_oauth2_login' %}" class="btn btn-outline-light rounded-pill px-4 btn-sm d-flex align-items-center gap-2"><i class="fa-brands fa-linkedin text-primary"></i> LinkedIn</a>
                </div>
            </div>

            <hr class="border-secondary mb-4">

            <div class="text-center small text-white-50">
                New to Bolloh? <a href="{% url 'users:signup' %}" class="text-info text-decoration-none fw-medium">Create an Account</a>
            </div>

        </form>
    </div>
</div>
{% endblock %}
